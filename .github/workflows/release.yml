name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build all targets
        run: |
          mkdir -p dist
          targets="darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64"
          for t in $targets; do
            os="${t%/*}"; arch="${t#*/}"; out="mdview-$os-$arch"
            [ "$os" = "windows" ] && out="$out.exe"
            echo "building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "dist/$out" .
          done
          cd dist && sha256sum mdview-* > SHA256SUMS && cat SHA256SUMS
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
      - name: Render Homebrew formula
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          sha() { grep " $1\$" dist/SHA256SUMS | cut -d' ' -f1; }
          sed \
            -e "s/__VERSION__/$ver/g" \
            -e "s/__SHA_DARWIN_ARM64__/$(sha mdview-darwin-arm64)/g" \
            -e "s/__SHA_DARWIN_AMD64__/$(sha mdview-darwin-amd64)/g" \
            -e "s/__SHA_LINUX_ARM64__/$(sha mdview-linux-arm64)/g" \
            -e "s/__SHA_LINUX_AMD64__/$(sha mdview-linux-amd64)/g" \
            .github/mdview.rb.tmpl > mdview.rb
          echo "----- rendered formula -----"
          cat mdview.rb
      - name: Check out tap
        uses: actions/checkout@v4
        with:
          repository: claude-code-tools/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Commit formula to tap
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          cp mdview.rb tap/Formula/mdview.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mdview.rb
          if git diff --cached --quiet; then
            echo "formula unchanged — nothing to push"
          else
            git commit -m "mdview ${GITHUB_REF_NAME#v}"
            git push
          fi
